<!DOCTYPE html>
<html>
<head>
  <title>Export Trading Data</title>
</head>
<body>
  <h1>Trading Journal - LocalStorage Export</h1>
  <pre id="output"></pre>
  <script>
    const keys = Object.keys(localStorage);
    let output = '';

    for (const key of keys) {
      if (key.includes('trade') || key.includes('ticket') || key.includes('position')) {
        output += `\n=== ${key} ===\n`;
        try {
          const data = JSON.parse(localStorage.getItem(key));
          output += JSON.stringify(data, null, 2);
        } catch (e) {
          output += localStorage.getItem(key);
        }
        output += '\n';
      }
    }

    if (!output) {
      output = 'No trading data found in localStorage.\n\nKeys found: ' + keys.join(', ');
    }

    document.getElementById('output').textContent = output;
    console.log(output);
  </script>
</body>
</html>
